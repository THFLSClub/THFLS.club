# ================================================================
#  天外计算机社 · _config.stellar.yml  v4
# ================================================================

inject:
  head:
    # Preconnect for font performance
    - <link rel="preconnect" href="https://fonts.googleapis.com">
    - <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    # Fonts: Syne (display EN), Noto Serif SC (CJK title), JetBrains Mono (terminal)
    - <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:ital,wght@0,400;0,600;0,700;1,400&family=Syne:wght@700;800;900&family=Noto+Serif+SC:wght@700;900&display=swap" rel="stylesheet">
    # Our design system
    - <link rel="stylesheet" href="/css/custom.css">
  script:
    # Runs sync — must execute before first paint so body:not(.thfls-ready) hides jank
    - <script src="/js/thfls.js"></script>

darkmode: force

# ── NAV ──────────────────────────────────────────────────────
menubar:
  columns: 4
  items:
    - id: home
      title: 主页
      url: /
    - id: links
      title: 友链
      url: /links
    - id: services
      title: 服务
      url: /services
    - id: about
      title: 关于
      url: /about

# ── FOOTER (Stellar's own, hidden on homepage by our rebuild) ─
footer:
  content: ''
  social:
    github:
      icon: ''
      url: https://github.com/THFLSClub
    telegram:
      icon: ''
      url: https://t.me/GZTHFLS
    rss:
      icon: ''
      url: /atom.xml

rss: /atom.xml
